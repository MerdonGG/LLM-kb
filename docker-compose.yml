services:

  ollama:
    image: ollama/ollama:latest
    container_name: kbe-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build: ./backend
    container_name: kbe-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./pdfs:/app/pdfs
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama

  frontend:
    build: ./frontend
    container_name: kbe-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  ollama_data:
